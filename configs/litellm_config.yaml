# LiteLLM Configuration
# Unified API for local + cloud LLMs
#
# Usage in your code:
#   from litellm import completion
#   response = completion(model="specpilot-local", messages=[...])
#
# Or via OpenAI-compatible API:
#   base_url = "http://localhost:4000"

model_list:
  # ===========================================
  # Local Models (Ollama) - No API cost
  # ===========================================
  
  # Primary coding model for SpecPilot
  - model_name: specpilot-local
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://localhost:11434
    model_info:
      description: "Temporary fallback to Phi-3 Mini for local validation"
      max_tokens: 4096

  # General purpose local model
  - model_name: mistral-local
    litellm_params:
      model: ollama/mistral:7b-instruct
      api_base: http://localhost:11434
    model_info:
      description: "Mistral 7B - General purpose, good for analysis"
      max_tokens: 8192

  # Smaller, faster model for quick tasks
  - model_name: phi3-local
    litellm_params:
      model: ollama/phi3:mini
      api_base: http://localhost:11434
    model_info:
      description: "Phi-3 Mini - Fast model for simple tasks"
      max_tokens: 4096

  # Larger model (uses CPU offloading with 64GB RAM)
  - model_name: codellama-13b-local
    litellm_params:
      model: ollama/codellama:13b-instruct
      api_base: http://localhost:11434
    model_info:
      description: "CodeLlama 13B - Higher quality, slower (CPU offload)"
      max_tokens: 4096

  # ===========================================
  # Cloud Models (Fallback) - API cost applies
  # ===========================================
  
  # Claude for complex reasoning (when local isn't enough)
  - model_name: claude-fallback
    litellm_params:
      model: claude-3-haiku-20240307
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Claude Haiku - Cloud fallback for complex tasks"
      max_tokens: 4096

  - model_name: claude-sonnet
    litellm_params:
      model: claude-sonnet-4-20250514
      api_key: os.environ/ANTHROPIC_API_KEY
    model_info:
      description: "Claude Sonnet - High quality cloud model"
      max_tokens: 8192

# ===========================================
# Routing Configuration
# ===========================================
router_settings:
  routing_strategy: "simple-shuffle"  # or "least-busy", "latency-based"
  num_retries: 2
  timeout: 120

# ===========================================
# Rate Limits (protect cloud API costs)
# ===========================================
litellm_settings:
  success_callback: []
  failure_callback: []
  max_budget: 10.0  # Max $10/day on cloud APIs
  budget_duration: "1d"

general_settings:
  master_key: sk-shrike-local
