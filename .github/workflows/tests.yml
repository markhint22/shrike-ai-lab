name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pytest-cov
          pip install -r requirements.txt
      
      - name: Run tests
        run: |
          pytest tests/ -v --tb=short
      
      - name: Check training data format
        run: |
          python -c "
          import json
          from pathlib import Path
          
          data_files = list(Path('training').rglob('*.jsonl'))
          print(f'Found {len(data_files)} training data files')
          
          for f in data_files:
              with open(f) as fp:
                  for i, line in enumerate(fp, 1):
                      try:
                          json.loads(line)
                      except json.JSONDecodeError as e:
                          print(f'ERROR: {f}:{i} - Invalid JSON: {e}')
                          exit(1)
              print(f'✓ {f.relative_to(\"training\")} - Valid')
          "
      
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check scripts/ agents/ --ignore E501
        continue-on-error: true


  validate-configs:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate docker-compose
        run: |
          docker compose config -q
      
      - name: Validate YAML configs
        run: |
          pip install pyyaml
          python -c "
          import yaml
          from pathlib import Path
          
          for f in Path('configs').glob('*.yaml'):
              with open(f) as fp:
                  yaml.safe_load(fp)
              print(f'✓ {f.name} - Valid')
          "
