# policy-thresholds.yaml

Team: gitlark-memdiff-efficiency-team
Mode: dry-run

## Summary
Prepared a memdiff policy blueprint to reduce unnecessary full refreshes while protecting freshness-sensitive queries.

## Recommended Actions
1. Classify incoming queries into structure/code/freshness-sensitive buckets.
2. Apply cache-read by default for stable structural queries.
3. Use selective subtree refresh for medium-risk freshness queries.
4. Reserve full-refresh for high-risk or release-sensitive requests.
5. Enforce guardrails: max staleness budget, refresh escalation rules, and rollback triggers.
6. Track decision outcomes and update policy thresholds weekly.

